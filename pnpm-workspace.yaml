packages:
  - "apps/*"
  - "packages/*"
  - "tools/*"
catalogMode: prefer
cleanupUnusedCatalogs: true
allowBuilds:
  core-js-pure: false
  esbuild: true
  lefthook: true
  msw: false
  sharp: true
  workerd: true
catalog:
  # Tooling
  "@biomejs/biome": 2.4.15
  "@changesets/cli": ^2.31.0
  "@changesets/changelog-github": ^0.7.0
  turbo: ^2.10.3
  tsx: ^4.23.0
  typescript: ^6.0.3
  ultracite: 7.8.1
  lefthook: ^2.1.9

  # Types
  "@types/mdx": ^2.0.14
  "@types/node": ^25.9.4
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3

  # React
  react: ^19.2.7
  react-dom: ^19.2.7

  # Build / bundling
  tsdown: ^0.22.3

  # Vite / Cloudflare
  vite: ^8.1.3
  "@vitejs/plugin-react": ^6.0.3
  "@cloudflare/vite-plugin": ^1.43.0
  wrangler: ^4.107.0

  # Tailwind / styling
  tailwindcss: ^4.3.2
  "@tailwindcss/vite": ^4.3.2
  tailwind-merge: ^3.6.0
  tw-animate-css: ^1.4.0
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1

  # UI libraries
  "@base-ui/react": ^1.6.0
  lucide-react: ^1.23.0
  motion: ^12.42.2
  shadcn: ^4.13.0
  sugar-high: ^1.2.1
  vaul: ^1.1.2

  # Fonts
  "@fontsource-variable/hubot-sans": ^5.2.8
  "@fontsource/iosevka": ^5.2.5

  # Fumadocs
  fumadocs-core: 16.8.11
  fumadocs-mdx: 15.0.6
  fumadocs-ui: 16.8.11

  # TanStack
  "@tanstack/react-router": 1.170.4
  "@tanstack/react-start": 1.168.6

  "@fontsource-variable/figtree": ^5.2.10
  knip: ^6.24.0
