name: CI

# Runs on every pull request (including from forks) and on pushes to main.
on:
  pull_request:
  push:
    branches:
      - main

# Cancel superseded runs on the same ref (e.g. when a PR is updated).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Lint, typecheck, build & knip
    runs-on: ubuntu-latest
    env:
      # Don't run lefthook git hooks in CI — this workflow runs the checks
      # explicitly below, and the hooks would only duplicate (or interfere).
      LEFTHOOK: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first: typecheck depends on generated artifacts
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Knip
        run: pnpm knip
