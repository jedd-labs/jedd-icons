name: Changeset check

# Soft (non-blocking) reminder. If a PR changes a *published* package
# (@jedd-icons/react / @jedd-icons/core) without a changeset, this posts a
# comment asking for one. It never fails the PR — the PR template checkbox is
# the contract; this just makes a forgotten changeset visible.
on:
  pull_request:

# One comment per PR; supersede in-flight runs when the PR updates.
concurrency:
  group: changeset-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # post/update the reminder comment

jobs:
  changeset:
    name: Changeset present?
    runs-on: ubuntu-latest
    # Forks can't get a write token, so the comment step would fail. Skip them;
    # the maintainer sees the missing changeset at merge time regardless.
    if: github.event.pull_request.head.repo.full_name == github.repository
    env:
      LEFTHOOK: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changeset status diffs against the base branch

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `changeset status` reports on
      # ANY changed workspace package — including private ones. Instead scope precisely: a changeset is required
      # only when a PUBLISHED package's source changed. If it did and no new
      # changeset .md was added, flag it.
      - name: Check for missing changeset
        id: status
        env:
          BASE: origin/${{ github.base_ref }}
        run: |
          published_changed=$(git diff --name-only "$BASE"...HEAD -- \
            icons packages/react packages/core \
            | grep -v '/dist/' || true)

          # Any changeset markdown added in this PR (exclude README/config).
          changeset_added=$(git diff --name-only --diff-filter=A "$BASE"...HEAD -- \
            '.changeset/*.md' | grep -viE '/(README)\.md$' || true)

          if [ -n "$published_changed" ] && [ -z "$changeset_added" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "Published package changed, no changeset found:"
            echo "$published_changed"
          else
            echo "missing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment if a changeset is missing
        if: steps.status.outputs.missing == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: changeset-check
          message: |
            ⚠️ **This PR changes a published package but has no changeset.**

            If this is an intentional exception (a change that shouldn't ship a
            changelog line), you can ignore this. Otherwise, add one:

            ```bash
            pnpm changeset
            ```

            The summary you write becomes the public changelog line. Pre-1.0,
            breaking changes ride a **minor** bump.

      # Clear the reminder once a changeset shows up (or the change no longer
      # touches a published package), so a stale warning doesn't linger.
      - name: Resolve comment when satisfied
        if: steps.status.outputs.missing == 'false'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: changeset-check
          delete: true
